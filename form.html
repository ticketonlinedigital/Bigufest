<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIGU FESTIVAL 2026 - Form Pemesanan</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{overflow-x:hidden;background:linear-gradient(180deg,#2b1038 0%,#5a2b6d 45%,#8b5aa7 100%);color:#111;padding-bottom:120px}
.container{max-width:900px;margin:auto}
.banner img{width:100%;display:block;border-bottom-left-radius:30px;border-bottom-right-radius:30px}
.hero-card{background:rgba(255,255,255,.12);backdrop-filter:blur(14px);margin:-35px 20px 20px;padding:25px;border-radius:28px;position:relative;z-index:2;text-align:center;box-shadow:0 15px 35px rgba(0,0,0,.25);color:#fff;border:1px solid rgba(255,255,255,.15)}
.event-info{display:flex;justify-content:center;gap:20px;margin-top:15px;flex-wrap:wrap;color:#f4dfff}
.header{padding:10px 25px 5px}
.card{background:rgba(255,255,255,.10);backdrop-filter:blur(12px);border-radius:28px;padding:28px;margin:20px;box-shadow:0 10px 30px rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.12);color:#fff}
.title{font-size:20px;font-weight:700;margin-bottom:18px;color:#ffb6e8}
label{display:block;font-weight:600;margin-top:14px}
input,select,textarea{width:100%;padding:16px;margin-top:8px;border-radius:16px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff}
.summary-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px dashed rgba(255,255,255,.25)}
.total{font-size:28px;font-weight:800;color:#ffb6e8}
.check{display:flex;gap:10px;margin-top:14px;align-items:flex-start}
.check input{width:auto}
.bottom{position:fixed;left:0;right:0;bottom:0;background:rgba(33,10,45,.95);padding:15px;box-shadow:0 -5px 20px rgba(0,0,0,.35)}
.btn{width:100%;max-width:900px;margin:auto;display:block;padding:18px;border:none;border-radius:18px;background:linear-gradient(135deg,#ff7edb,#c56bff);color:#fff;font-size:17px;font-weight:700}
#loading{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);color:#fff;z-index:9999;justify-content:center;align-items:center;flex-direction:column}
</style>
</head>
<body>
<div class="container">
<div class="banner"><img src="banner.png" alt="Banner Event"></div>
<div class="hero-card">
<h2>🌸 BIGU FESTIVAL 2026 • MUSIK SAMBIL PIKNIK 🌸</h2>
<p>festival musik dan piknik terbesar persembahan Bigu Creative dengan tema 'Musik Sambil Piknik'.</p>
</div>

<div class="card">
<div class="title">Ringkasan Pesanan</div>
<div class="summary-row"><span>Jenis Tiket</span><strong id="jenisTiket">-</strong></div>
<div id="detailTiket"></div>
<div class="summary-row"><span>Jumlah Tiket</span><strong id="jumlahTiket">0</strong></div>
<div class="summary-row total"><span>Total</span><span id="totalBayar">Rp0</span></div>
</div>

<div class="card">
<div class="title">Data Pemesan</div>
<label>Nama Lengkap *</label><input id="nama">
<label>Jenis Identitas *</label>
<select id="identitas">
<option value="">Pilih Identitas</option>
<option>KTP</option><option>SIM</option><option>Paspor</option><option>Kartu Pelajar</option>
</select>
<label>Nomor Identitas *</label><input id="nomorId">
<label>E-mail *</label><input id="email" type="email">
<label>No. WhatsApp *</label><input id="wa">
<label>Alamat *</label><textarea id="alamat"></textarea>
</div>

<div class="card">
<div class="check"><input type="checkbox" id="setuju1"><label for="setuju1">Data yang saya isi benar.</label></div>
<div class="check"><input type="checkbox" id="setuju2"><label for="setuju2">Saya menyetujui syarat dan ketentuan.</label></div>
</div>
</div>

<div class="bottom"><button class="btn" id="lanjut">LANJUT KE PEMBAYARAN</button></div>
<div id="loading">Sedang memproses...</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

emailjs.init({
 publicKey:"GswCLlhYTpkoRMkcR"
});

const items = JSON.parse(
 localStorage.getItem('checkout_items') || '[]'
);

const total = Number(
 localStorage.getItem('totalPembayaran') || 0
);

const jumlahTiket = Number(
 localStorage.getItem('jumlahTiket') || 0
);

const namaEl = document.getElementById('nama');
const identitasEl = document.getElementById('identitas');
const nomorIdEl = document.getElementById('nomorId');
const emailEl = document.getElementById('email');
const waEl = document.getElementById('wa');
const alamatEl = document.getElementById('alamat');

const setuju1El = document.getElementById('setuju1');
const setuju2El = document.getElementById('setuju2');

const loadingEl = document.getElementById('loading');
const lanjutBtn = document.getElementById('lanjut');

document.getElementById('totalBayar').innerText =
'Rp'+total.toLocaleString('id-ID');

document.getElementById('jumlahTiket').innerText =
jumlahTiket;

let htmlDetail='';

items.forEach(item=>{

 const subtotal=item.qty*item.harga;

 htmlDetail += `
 <div class="summary-row">
   <span>${item.nama} (${item.qty})</span>
   <strong>Rp ${subtotal.toLocaleString('id-ID')}</strong>
 </div>`;
});

document.getElementById('detailTiket').innerHTML =
htmlDetail;

const jenis =
items.map(i=>`${i.nama} (${i.qty})`).join(', ');

document.getElementById('jenisTiket').innerText =
jenis || '-';

function saveDraft(){

 localStorage.setItem('draft_nama',namaEl.value);
 localStorage.setItem('draft_identitas',identitasEl.value);
 localStorage.setItem('draft_nomorId',nomorIdEl.value);
 localStorage.setItem('draft_email',emailEl.value);
 localStorage.setItem('draft_wa',waEl.value);
 localStorage.setItem('draft_alamat',alamatEl.value);
}

function restoreDraft(){

 namaEl.value =
 localStorage.getItem('draft_nama') || '';

 identitasEl.value =
 localStorage.getItem('draft_identitas') || '';

 nomorIdEl.value =
 localStorage.getItem('draft_nomorId') || '';

 emailEl.value =
 localStorage.getItem('draft_email') || '';

 waEl.value =
 localStorage.getItem('draft_wa') || '';

 alamatEl.value =
 localStorage.getItem('draft_alamat') || '';
}

restoreDraft();

[namaEl,identitasEl,nomorIdEl,emailEl,waEl,alamatEl]
.forEach(el=>{
 el.addEventListener('input',saveDraft);
 el.addEventListener('change',saveDraft);
});

lanjutBtn.onclick=function(){

 const wajib=[
  namaEl,
  identitasEl,
  nomorIdEl,
  emailEl,
  waEl,
  alamatEl
 ];

 for(const field of wajib){

   if(!field.value.trim()){

     alert('Mohon lengkapi semua data.');
     return;
   }
 }

 if(!setuju1El.checked || !setuju2El.checked){

   alert('Centang seluruh persetujuan.');
   return;
 }

 lanjutBtn.disabled=true;

 localStorage.setItem('jenisTiket',jenis);
 localStorage.setItem('jumlahTiket',jumlahTiket);

 emailjs.send(
  "service_js4dbeg",
  "template_6xcn2pq",
  {
   nama:namaEl.value,
   identitas:identitasEl.value,
   nomor_id:nomorIdEl.value,
   email:emailEl.value,
   whatsapp:waEl.value,
   alamat:alamatEl.value,
   jenis_tiket:jenis,
   jumlah_tiket:jumlahTiket,
   total_bayar:total
  }
 ).catch(()=>{});

 loadingEl.style.display='flex';

 setTimeout(()=>{

   location.href='qris.html';

 },3000);
};

</script>

</body>
</html>
